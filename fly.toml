# fly.toml - جاهز للنسخ
app = "ecostamp-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[env]
  NODE_ENV = "production"
  PORT = "3000"

[mounts]
  source = "stampcoin_data"
  destination = "/app/data"

[checks]
  [checks.health]
    port = 3000
    type = "http"
    interval = "30s"
    timeout = "5s"
    path = "/api/health"

[deploy]
  strategy = "rolling"
