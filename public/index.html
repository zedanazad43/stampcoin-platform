<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="stampApp()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stampcoin (STP) — منصة تداول الطوابع البريدية الرقمية</title>
  <meta name="description" content="منصة Stampcoin لتداول الطوابع البريدية الرقمية NFT والمزادات ومحفظة STP." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✉</text></svg>" />
  <script src="https://cdn.tailwindcss.com"><\/script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"><\/script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
  <style>
    [x-cloak]{display:none!important}
    body{font-family:'Cairo','Segoe UI',sans-serif}
    .gradient-text{background:linear-gradient(135deg,#f59e0b 0%,#fbbf24 50%,#d97706 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-bg{background:radial-gradient(ellipse at 20% 50%,rgba(139,92,246,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(245,158,11,.1) 0%,transparent 50%),linear-gradient(180deg,#0a0f1e 0%,#0f172a 100%)}
    .nav-glass{background:rgba(10,15,30,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(245,158,11,.15)}
    .stamp-card{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border:1px solid rgba(245,158,11,.2);transition:all .3s ease}
    .stamp-card:hover{border-color:rgba(245,158,11,.6);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.4),0 0 30px rgba(245,158,11,.15)}
    .glow-gold{text-shadow:0 0 20px rgba(245,158,11,.6)}
    .glow-box-gold{box-shadow:0 0 30px rgba(245,158,11,.2),0 0 60px rgba(245,158,11,.08)}
    .glow-box-purple{box-shadow:0 0 30px rgba(139,92,246,.2),0 0 60px rgba(139,92,246,.08)}
    .nft-shine{background:linear-gradient(135deg,#1e293b 0%,#2d1f6e 50%,#1e293b 100%);border:1px solid rgba(139,92,246,.4)}
    .timer-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:4px 10px;font-family:'Courier New',monospace}
    .modal-overlay{background:rgba(0,0,0,.8);backdrop-filter:blur(4px)}
    .tab-active{background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(245,158,11,.05));border-color:rgba(245,158,11,.6);color:#f59e0b}
    @keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
    @keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(245,158,11,.3)}50%{box-shadow:0 0 40px rgba(245,158,11,.6)}}
    @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .floating{animation:float 4s ease-in-out infinite}
    .pulse-glow{animation:pulse-glow 2s ease-in-out infinite}
    .marquee-track{animation:marquee 30s linear infinite}
    .perforated{position:relative}
    .perforated::before,.perforated::after{content:'';position:absolute;left:0;right:0;height:12px;background:radial-gradient(circle at 50% 100%,transparent 6px,#0f172a 6px);background-size:18px 12px}
    .perforated::before{top:-11px;transform:rotate(180deg)}
    .perforated::after{bottom:-11px}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#0a0f1e}
    ::-webkit-scrollbar-thumb{background:rgba(245,158,11,.4);border-radius:3px}
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen" x-cloak>

<!-- NAV -->
<nav class="nav-glass fixed top-0 left-0 right-0 z-50 px-4 lg:px-8">
  <div class="max-w-7xl mx-auto flex items-center justify-between h-16">
    <a href="#home" class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center text-slate-900 font-black text-lg pulse-glow">&#9993;</div>
      <div><span class="font-black text-xl gradient-text">Stampcoin</span><span class="text-amber-400/60 text-xs block -mt-1">STP Platform</span></div>
    </a>
    <div class="hidden md:flex items-center gap-1">
      <template x-for="item in navItems" :key="item.id">
        <button @click="scrollTo(item.id)" :class="activeSection===item.id?'text-amber-400 bg-amber-400/10':'text-slate-400 hover:text-amber-400 hover:bg-amber-400/5'" class="px-3 py-2 rounded-lg text-sm font-medium transition-all" x-text="item.label"></button>
      </template>
    </div>
    <div class="flex items-center gap-3">
      <div x-show="walletConnected" class="hidden sm:flex items-center gap-2 bg-amber-400/10 border border-amber-400/30 rounded-full px-4 py-1.5">
        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
        <span class="text-amber-400 text-sm font-mono" x-text="(wallet.balance||0).toLocaleString()+' STP'"></span>
      </div>
      <button @click="walletConnected?disconnectWallet():showWalletModal=true" :class="walletConnected?'bg-slate-700 hover:bg-slate-600':'bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500'" class="px-4 py-2 rounded-full text-sm font-bold text-white transition-all shadow-lg" x-text="walletConnected?'🔓 '+((wallet.userId||'')).substring(0,8)+'...':'🔗 ربط المحفظة'"></button>
      <button @click="mobileMenu=!mobileMenu" class="md:hidden text-slate-400 hover:text-amber-400 p-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </div>
  <div x-show="mobileMenu" x-transition class="md:hidden bg-slate-900/95 border-t border-amber-400/20 py-3 px-4">
    <template x-for="item in navItems" :key="item.id">
      <button @click="scrollTo(item.id);mobileMenu=false" class="block w-full text-right py-3 px-4 text-slate-300 hover:text-amber-400 hover:bg-amber-400/5 rounded-lg transition-colors text-sm font-medium" x-text="item.label"></button>
    </template>
  </div>
</nav>

<!-- TICKER -->
<div class="fixed top-16 left-0 right-0 z-40 bg-slate-900/90 border-b border-amber-400/10 py-2 overflow-hidden">
  <div class="flex whitespace-nowrap marquee-track">
    <template x-for="i in 2" :key="i">
      <div class="flex gap-8 pr-8">
        <template x-for="coin in tickers" :key="coin.symbol+i">
          <span class="text-xs font-mono">
            <span class="text-amber-400 font-bold" x-text="coin.symbol"></span>
            <span class="text-slate-300 mx-1" x-text="coin.price"></span>
            <span :class="coin.change>=0?'text-green-400':'text-red-400'" x-text="(coin.change>=0?'+':'')+coin.change+'%'"></span>
          </span>
        </template>
      </div>
    </template>
  </div>
</div>

<!-- HERO -->
<section id="home" class="hero-bg min-h-screen pt-36 pb-20 px-4 flex items-center">
  <div class="max-w-7xl mx-auto w-full">
    <div class="grid lg:grid-cols-2 gap-12 items-center">
      <div class="text-right">
        <div class="inline-flex items-center gap-2 bg-amber-400/10 border border-amber-400/30 rounded-full px-4 py-2 text-amber-400 text-sm font-medium mb-6">
          <span class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></span>
          منصة الطوابع البريدية الرقمية الأولى عالمياً
        </div>
        <h1 class="text-5xl lg:text-7xl font-black mb-6 leading-tight">
          <span class="gradient-text glow-gold">Stampcoin</span><br/>
          <span class="text-white">منصة تداول</span><br/>
          <span class="text-slate-400 text-4xl lg:text-5xl">الطوابع الرقمية</span>
        </h1>
        <p class="text-slate-400 text-lg mb-8 leading-relaxed">حوّل طوابعك البريدية النادرة إلى <strong class="text-amber-400">NFTs</strong> وتداولها في أكبر سوق رقمي. استثمر في <strong class="text-purple-400">رمز STP</strong> واكتشف قيمة التراث البريدي.</p>
        <div class="flex flex-wrap gap-4 justify-end">
          <button @click="scrollTo('market')" class="bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-white font-bold px-8 py-4 rounded-full text-lg transition-all shadow-xl hover:-translate-y-1">&#127823; استكشف السوق</button>
          <button @click="scrollTo('nft-mint')" class="border border-purple-500/50 hover:border-purple-400 text-purple-400 hover:text-purple-300 font-bold px-8 py-4 rounded-full text-lg transition-all hover:-translate-y-1">&#127912; توثيق طابعك</button>
        </div>
        <div class="grid grid-cols-3 gap-4 mt-12 pt-8 border-t border-slate-800">
          <template x-for="stat in heroStats" :key="stat.label">
            <div class="text-right">
              <div class="text-2xl lg:text-3xl font-black gradient-text" x-text="stat.value"></div>
              <div class="text-slate-500 text-sm" x-text="stat.label"></div>
            </div>
          </template>
        </div>
      </div>
      <div class="relative flex justify-center items-center h-80 lg:h-96">
        <div class="floating mx-8">
          <div class="perforated w-56 h-72 bg-gradient-to-br from-slate-800 to-slate-900 rounded-sm glow-box-gold flex flex-col items-center justify-center p-6">
            <div class="text-6xl mb-4">&#127963;</div>
            <div class="text-amber-400 text-xl font-bold text-center">Stampcoin</div>
            <div class="text-slate-400 text-sm mt-1">DIGITAL HERITAGE</div>
            <div class="mt-4 border-t border-amber-400/20 pt-3 w-full text-center"><span class="text-amber-400/60 text-xs font-mono">#STP-0001</span></div>
            <div class="text-slate-600 text-xs font-mono mt-2">100 STP</div>
          </div>
        </div>
        <div class="absolute top-4 right-4 bg-purple-600/20 border border-purple-500/40 rounded-xl p-3 text-center floating" style="animation-delay:1s">
          <div class="text-2xl">&#127912;</div><div class="text-purple-400 text-xs font-bold mt-1">NFT</div><div class="text-slate-400 text-xs">Verified</div>
        </div>
        <div class="absolute bottom-8 left-4 bg-amber-400/10 border border-amber-400/30 rounded-xl p-3 floating" style="animation-delay:2s">
          <div class="text-amber-400 text-xl font-black">+28%</div><div class="text-slate-400 text-xs">24h Change</div>
        </div>
        <div class="absolute top-16 left-0 bg-red-400/10 border border-red-400/30 rounded-xl p-3 floating" style="animation-delay:.5s">
          <div class="text-red-400 text-sm font-bold">&#128308; Live Auction</div><div class="text-slate-400 text-xs">3 Active Bids</div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- MARKET -->
<section id="market" class="bg-gradient-to-b from-slate-900 to-slate-950 py-20 px-4">
  <div class="max-w-7xl mx-auto">
    <div class="text-center mb-12">
      <h2 class="text-4xl lg:text-5xl font-black mb-4"><span class="gradient-text">سوق الطوابع</span> الرقمية</h2>
      <p class="text-slate-400 text-lg">اكتشف واشترِ وبع الطوابع البريدية النادرة كـ NFTs</p>
    </div>
    <div class="flex flex-wrap gap-3 justify-center mb-8">
      <template x-for="filter in marketFilters" :key="filter">
        <button @click="activeMarketFilter=filter" :class="activeMarketFilter===filter?'tab-active border':'bg-slate-800/50 border border-slate-700 text-slate-400 hover:border-amber-400/40 hover:text-amber-400'" class="px-5 py-2.5 rounded-full text-sm font-medium transition-all" x-text="filter"></button>
      </template>
    </div>
    <div class="flex flex-col sm:flex-row gap-4 mb-8">
      <div class="flex-1 relative">
        <input type="text" placeholder="ابحث عن طابع..." x-model="marketSearch" class="w-full bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-3 pr-10 text-slate-100 focus:outline-none focus:border-amber-400/50 placeholder-slate-500 text-right" />
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">&#128269;</span>
      </div>
      <select x-model="marketSort" class="bg-slate-800/60 border border-slate-700 rounded-xl px-4 py-3 text-slate-300 focus:outline-none">
        <option value="newest">الأحدث</option>
        <option value="price_asc">السعر: من الأقل</option>
        <option value="price_desc">السعر: من الأعلى</option>
        <option value="popular">الأكثر شعبية</option>
      </select>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
      <template x-for="item in filteredMarketItems" :key="item.id">
        <div class="stamp-card rounded-2xl overflow-hidden cursor-pointer" @click="selectedStamp=item">
          <div class="relative pt-[100%] bg-gradient-to-br from-slate-700 to-slate-800 overflow-hidden">
            <div class="absolute inset-0 flex items-center justify-center"><span class="text-5xl" x-text="item.emoji"></span></div>
            <div class="absolute top-2 right-2"><span x-show="item.isNft" class="bg-purple-600/90 text-white text-xs px-2 py-0.5 rounded-full font-bold">NFT</span></div>
            <div class="absolute top-2 left-2">
              <span x-show="item.rarity==='نادر'" class="bg-amber-500/90 text-white text-xs px-2 py-0.5 rounded-full font-bold">نادر</span>
              <span x-show="item.rarity==='نادر جداً'" class="bg-red-500/90 text-white text-xs px-2 py-0.5 rounded-full font-bold">نادر جداً</span>
            </div>
          </div>
          <div class="p-3">
            <div class="text-white font-bold text-sm mb-1 truncate text-right" x-text="item.name"></div>
            <div class="text-slate-500 text-xs mb-2 text-right" x-text="item.country+' · '+item.year"></div>
            <div class="flex items-center justify-between">
              <button @click.stop="buyStamp(item)" class="bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/30 hover:border-amber-500 text-amber-400 text-xs font-bold px-3 py-1.5 rounded-lg transition-all">شراء</button>
              <div class="text-right">
                <div class="text-amber-400 font-black text-sm" x-text="item.price.toLocaleString()+' STP'"></div>
                <div class="text-slate-500 text-xs" x-text="'$'+item.priceUsd"></div>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
    <div class="text-center mt-8">
      <button @click="showToast('📦 تم تحميل المزيد من الطوابع','info')" class="border border-amber-400/30 hover:border-amber-400 text-amber-400 px-8 py-3 rounded-full font-medium transition-all hover:-translate-y-1">تحميل المزيد</button>
    </div>
  </div>
</section>

<!-- AUCTIONS -->
<section id="auctions" class="py-20 px-4 bg-slate-900">
  <div class="max-w-7xl mx-auto">
    <div class="text-center mb-12">
      <h2 class="text-4xl lg:text-5xl font-black mb-4">&#128308; <span class="gradient-text">المزادات</span> الحية</h2>
      <p class="text-slate-400 text-lg">تنافس على امتلاك أندر الطوابع البريدية في العالم</p>
    </div>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <template x-for="auction in auctions" :key="auction.id">
        <div class="bg-slate-900/80 border border-slate-700/50 rounded-2xl overflow-hidden hover:border-red-500/40 transition-all duration-300 hover:-translate-y-1">
          <div class="relative bg-gradient-to-br from-slate-800 to-slate-900 p-6 text-center">
            <div class="text-6xl mb-3" x-text="auction.emoji"></div>
            <div class="absolute top-3 left-3 flex items-center gap-1 bg-red-500/20 border border-red-500/40 rounded-full px-2 py-0.5">
              <div class="w-1.5 h-1.5 bg-red-400 rounded-full animate-pulse"></div>
              <span class="text-red-400 text-xs font-bold">LIVE</span>
            </div>
            <div x-show="auction.verified" class="absolute top-3 right-3 bg-green-500/20 border border-green-500/40 rounded-full px-2 py-0.5 text-green-400 text-xs">&#10003; موثق</div>
          </div>
          <div class="p-5">
            <h3 class="text-white font-bold text-lg mb-1 text-right" x-text="auction.name"></h3>
            <p class="text-slate-500 text-sm mb-4 text-right" x-text="auction.description"></p>
            <div class="grid grid-cols-2 gap-3 mb-4">
              <div class="bg-slate-800/50 rounded-xl p-3 text-center">
                <div class="text-slate-500 text-xs mb-1">السعر الحالي</div>
                <div class="text-amber-400 font-black" x-text="auction.currentBid.toLocaleString()+' STP'"></div>
              </div>
              <div class="bg-slate-800/50 rounded-xl p-3 text-center">
                <div class="text-slate-500 text-xs mb-1">المزايدون</div>
                <div class="text-white font-bold" x-text="auction.bidCount+' مزايد'"></div>
              </div>
            </div>
            <div class="flex items-center justify-between mb-4">
              <span class="timer-box text-red-400 font-bold text-sm" x-text="getTimer(auction.endsAt)"></span>
              <span class="text-slate-500 text-sm">ينتهي خلال</span>
            </div>
            <div class="flex gap-2">
              <button @click="placeBid(auction)" class="flex-1 bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 text-white font-bold py-3 rounded-xl transition-all">&#128296; زايد الآن</button>
              <button @click="showToast('👁️ تمت إضافة المزاد للمتابعة','info')" class="bg-slate-800 hover:bg-slate-700 text-slate-400 px-3 rounded-xl transition-colors">&#128065;</button>
            </div>
          </div>
        </div>
      </template>
    </div>
    <div class="mt-12 text-center">
      <div class="inline-flex items-center gap-4 bg-slate-800/50 border border-amber-400/20 rounded-2xl p-6 flex-wrap justify-center">
        <span class="text-4xl">&#127942;</span>
        <div class="text-right"><div class="text-white font-bold text-lg">لديك طابع نادر؟</div><div class="text-slate-400 text-sm">ضعه في المزاد وابدأ المنافسة</div></div>
        <button @click="showToast('✅ ميزة إنشاء المزاد قريباً!','info')" class="bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold px-6 py-3 rounded-xl transition-all">إنشاء مزاد</button>
      </div>
    </div>
  </div>
</section>

<!-- WALLET -->
<section id="wallet" class="bg-gradient-to-b from-slate-950 to-slate-900 py-20 px-4">
  <div class="max-w-6xl mx-auto">
    <div class="text-center mb-12">
      <h2 class="text-4xl lg:text-5xl font-black mb-4">&#128188; <span class="gradient-text">محفظة</span> STP/NFT</h2>
      <p class="text-slate-400 text-lg">أدر رصيدك وطوابعك الرقمية في مكان واحد</p>
    </div>
    <div x-show="!walletConnected" class="text-center py-16">
      <div class="text-8xl mb-6">&#128272;</div>
      <h3 class="text-2xl font-bold text-white mb-3">ربط المحفظة مطلوب</h3>
      <p class="text-slate-400 mb-6">ربط محفظتك لعرض رصيدك وطوابعك الرقمية</p>
      <button @click="showWalletModal=true" class="bg-gradient-to-r from-amber-500 to-amber-600 text-white font-bold px-10 py-4 rounded-full text-lg hover:-translate-y-1 transition-all">&#128279; ربط المحفظة الآن</button>
    </div>
    <div x-show="walletConnected">
      <div class="grid md:grid-cols-3 gap-6 mb-8">
        <div class="bg-gradient-to-br from-amber-500/10 to-amber-600/5 border border-amber-400/20 rounded-2xl p-6 glow-box-gold">
          <div class="text-amber-400/60 text-sm mb-2 text-right">رصيد STP</div>
          <div class="text-amber-400 font-black text-3xl text-right" x-text="(wallet.balance||0).toLocaleString()"></div>
          <div class="text-slate-500 text-sm text-right mt-1" x-text="'≈ $'+(((wallet.balance||0)*0.0042).toFixed(2))"></div>
        </div>
        <div class="bg-gradient-to-br from-purple-500/10 to-purple-600/5 border border-purple-400/20 rounded-2xl p-6 glow-box-purple">
          <div class="text-purple-400/60 text-sm mb-2 text-right">طوابع NFT</div>
          <div class="text-purple-400 font-black text-3xl text-right" x-text="(wallet.stamps||[]).length"></div>
          <div class="text-slate-500 text-sm text-right mt-1">طابع رقمي موثق</div>
        </div>
        <div class="bg-gradient-to-br from-green-500/10 to-green-600/5 border border-green-400/20 rounded-2xl p-6">
          <div class="text-green-400/60 text-sm mb-2 text-right">إجمالي القيمة</div>
          <div class="text-green-400 font-black text-3xl text-right" x-text="'$'+(((wallet.balance||0)*0.0042+(wallet.stamps||[]).length*12).toFixed(2))"></div>
          <div class="text-slate-500 text-sm text-right mt-1">USD تقريباً</div>
        </div>
      </div>
      <div class="grid md:grid-cols-4 gap-4 mb-8">
        <button @click="showTransferModal=true" class="bg-slate-800/60 border border-slate-700 hover:border-amber-400/40 rounded-xl p-4 text-center transition-all hover:-translate-y-1 group">
          <div class="text-2xl mb-2">&#128100;</div><div class="text-slate-300 group-hover:text-amber-400 text-sm font-medium transition-colors">إرسال</div>
        </button>
        <button @click="showToast('📥 عنوانك: '+wallet.userId,'info')" class="bg-slate-800/60 border border-slate-700 hover:border-green-400/40 rounded-xl p-4 text-center transition-all hover:-translate-y-1 group">

    get filteredMarketItems(){
      let items=this.marketItems;
      if(this.activeMarketFilter!=='الكل'){
        if(this.activeMarketFilter==='NFT') items=items.filter(i=>i.isNft);
        else if(this.activeMarketFilter==='نادر') items=items.filter(i=>i.rarity!=='عادي');
        else items=items.filter(i=>i.type===this.activeMarketFilter||i.country.includes(this.activeMarketFilter));
      }
      if(this.marketSearch){const q=this.marketSearch.toLowerCase();items=items.filter(i=>i.name.toLowerCase().includes(q)||i.country.includes(this.marketSearch));}
      if(this.marketSort==='price_asc') items=[...items].sort((a,b)=>a.price-b.price);
      else if(this.marketSort==='price_desc') items=[...items].sort((a,b)=>b.price-a.price);
      else if(this.marketSort==='popular') items=[...items].sort((a,b)=>b.likes-a.likes);
      return items;
    },
    get filteredArchive(){
      let items=this.archiveItems;
      if(this.archiveSearch){const q=this.archiveSearch.toLowerCase();items=items.filter(i=>i.name.toLowerCase().includes(q)||i.country.includes(this.archiveSearch));}
      if(this.archiveCountry) items=items.filter(i=>i.country===this.archiveCountry);
      return items;
    },
    init(){
      this.loadWalletFromStorage();
      this.setupScrollSpy();
      this.$nextTick(()=>{this.initCharts();this.startAuctionTimers();});
    },
    scrollTo(id){
      this.activeSection=id;
      const el=document.getElementById(id);
      if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
      this.mobileMenu=false;
    },
    setupScrollSpy(){
      const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)this.activeSection=e.target.id;});},{threshold:0.3});
      document.querySelectorAll('section[id]').forEach(s=>obs.observe(s));
    },
    getTimer(endsAt){
      // _timerTick is referenced to make Alpine.js re-evaluate this expression each second
      void this._timerTick;
      const diff=Math.max(0,endsAt-Date.now());
      const h=Math.floor(diff/3600000);
      const m=Math.floor((diff%3600000)/60000);
      const s=Math.floor((diff%60000)/1000);
      return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    },
    startAuctionTimers(){
      // Increment display block number each second
      setInterval(()=>{this.displayBlockNumber++;},1000);
      // Force timer display refresh every second (only re-renders timer text)
      setInterval(()=>{this._timerTick=Date.now();},1000);
    },
    loadWalletFromStorage(){
      try{const s=localStorage.getItem('stp_wallet');if(s){const w=JSON.parse(s);this.wallet=w;this.walletConnected=true;this.loadTransactions(w.userId);}}catch(e){}
    },
    async connectWallet(){
      this.walletError='';
      if(!this.connectForm.userId){this.walletError='الرجاء إدخال معرف المستخدم';return;}
      try{
        let res=await fetch(API_BASE+'/api/wallet/'+this.connectForm.userId);
        if(res.status===404){
          if(!this.connectForm.userName){this.walletError='الرجاء إدخال الاسم لإنشاء محفظة جديدة';return;}
          res=await fetch(API_BASE+'/api/wallet/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:this.connectForm.userId,userName:this.connectForm.userName})});
        }
        const data=await res.json();
        if(data.error){this.walletError=data.error;return;}
        this.wallet=data;this.walletConnected=true;
        localStorage.setItem('stp_wallet',JSON.stringify(data));
        this.showWalletModal=false;
        this.loadTransactions(data.userId);
        this.showToast('✅ تم ربط المحفظة بنجاح','success');
      }catch(e){this.walletError='خطأ في الاتصال بالخادم';}
    },
    disconnectWallet(){
      this.walletConnected=false;this.wallet={};this.transactions=[];
      localStorage.removeItem('stp_wallet');
      this.showToast('🔓 تم قطع اتصال المحفظة','info');
    },
    async loadTransactions(userId){
      try{const res=await fetch(API_BASE+'/api/wallet/'+userId+'/transactions');const data=await res.json();this.transactions=Array.isArray(data)?data:[];}catch(e){}
    },
    async buyStamp(item){
      if(!this.walletConnected){this.showWalletModal=true;return;}
      if((this.wallet.balance||0)<item.price){this.showToast('❌ رصيد غير كافٍ لشراء هذا الطابع','error');return;}
      // Call market API if item has a server-side ID, otherwise show demo message
      try{
        if(item.serverId){
          const res=await fetch(API_BASE+'/api/market/items/'+item.serverId+'/buy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({buyerId:this.wallet.userId})});
          const data=await res.json();
          if(data.error){this.showToast('❌ '+data.error,'error');return;}
        }
        this.wallet.balance=Math.max(0,(this.wallet.balance||0)-item.price);
        localStorage.setItem('stp_wallet',JSON.stringify(this.wallet));
        this.showToast('✅ تم شراء "'+item.name+'" بنجاح!','success');
      }catch(e){this.showToast('✅ تم شراء "'+item.name+'" بنجاح! (وضع عرض)','success');}
    },
    async placeBid(auction){
      if(!this.walletConnected){this.showWalletModal=true;return;}
      const bid=auction.minBid;
      if((this.wallet.balance||0)<bid){this.showToast('❌ رصيد غير كافٍ للمزايدة','error');return;}
      try{
        if(auction.serverId){
          const res=await fetch(API_BASE+'/api/auctions/'+auction.serverId+'/bid',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bidderId:this.wallet.userId,amount:bid})});
          const data=await res.json();
          if(data.error){this.showToast('❌ '+data.error,'error');return;}
        }
        auction.currentBid=bid;
        auction.minBid=bid+Math.ceil(bid*0.05);
        auction.bidCount++;
        this.showToast('🔨 تم تسجيل مزايدتك بـ '+bid.toLocaleString()+' STP','success');
      }catch(e){
        auction.currentBid=bid;auction.minBid=bid+Math.ceil(bid*0.05);auction.bidCount++;
        this.showToast('🔨 تم تسجيل مزايدتك بـ '+bid.toLocaleString()+' STP','success');
      }
    },
    async doTransfer(){
      this.transferMessage='';
      if(!this.transferForm.to||!this.transferForm.amount){this.transferMessage='الرجاء ملء جميع الحقول';this.transferSuccess=false;return;}
      try{
        const res=await fetch(API_BASE+'/api/wallet/transfer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fromUserId:this.wallet.userId,toUserId:this.transferForm.to,amount:Number(this.transferForm.amount)})});
        const data=await res.json();
        if(data.error){this.transferMessage=data.error;this.transferSuccess=false;}
        else{this.transferMessage='✅ تم الإرسال بنجاح!';this.transferSuccess=true;this.wallet.balance-=Number(this.transferForm.amount);this.loadTransactions(this.wallet.userId);setTimeout(()=>{this.showTransferModal=false;this.transferMessage='';},1500);}
      }catch(e){this.transferMessage='خطأ في الاتصال';this.transferSuccess=false;}
    },
    handleFileSelect(event){const f=event.target.files[0];if(f){const r=new FileReader();r.onload=e=>{this.nftPreview=e.target.result;};r.readAsDataURL(f);}},
    handleDrop(event){this.dragOver=false;const f=event.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){const r=new FileReader();r.onload=e=>{this.nftPreview=e.target.result;};r.readAsDataURL(f);}},
    async mintNFT(){
      if(!this.walletConnected){this.showWalletModal=true;return;}
      if(!this.nftForm.name)return;
      this.nftMinting=true;
      try{
        // Call backend NFT mint API
        const res=await fetch(API_BASE+'/api/nft/mint',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ownerId:this.wallet.userId,name:this.nftForm.name,country:this.nftForm.country,year:this.nftForm.year?Number(this.nftForm.year):null,description:this.nftForm.description,rarity:this.nftForm.rarity})
        });
        const data=await res.json();
        if(data.error){this.showToast('❌ '+data.error,'error');return;}
        const stampId=data.tokenId||('STP-'+Date.now().toString(36).toUpperCase());
        if(!this.wallet.stamps)this.wallet.stamps=[];
        this.wallet.stamps.push({stampId,...this.nftForm});
        this.wallet.balance=Math.max(0,(this.wallet.balance||0)-50);
        localStorage.setItem('stp_wallet',JSON.stringify(this.wallet));
        this.showToast('🎨 تم توثيق الطابع كـ NFT! معرف: '+stampId,'success');
        this.nftForm={name:'',country:'',year:'',description:'',rarity:'عادي'};
        this.nftPreview=null;
      }catch(e){
        // Fallback: mint locally if server unreachable
        const stampId='STP-'+Date.now().toString(36).toUpperCase();
        if(!this.wallet.stamps)this.wallet.stamps=[];
        this.wallet.stamps.push({stampId,...this.nftForm});
        this.wallet.balance=Math.max(0,(this.wallet.balance||0)-50);
        localStorage.setItem('stp_wallet',JSON.stringify(this.wallet));
        this.showToast('🎨 تم توثيق الطابع! معرف: '+stampId,'success');
        this.nftForm={name:'',country:'',year:'',description:'',rarity:'عادي'};
        this.nftPreview=null;
      }
      finally{this.nftMinting=false;}
    },
    showToast(message,type='success'){
      const icons={success:'✅',error:'❌',info:'ℹ️'};
      this.toast={show:true,message,type,icon:icons[type]||'✅'};
      setTimeout(()=>{this.toast.show=false;},3500);
    },
    initCharts(){
      const vCtx=document.getElementById('volumeChart');
