name: Deploy to Fly.io
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}